<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oruvian · Hızlı Fiyat</title>
<style>
  :root{--ink:#0e0e10;--txt:#1a1a1d;--txt2:#5b5b63;--line:rgba(20,20,25,.10);
    --glass:rgba(255,255,255,.6);--glass-brd:rgba(255,255,255,.65);--ok:#16a34a;--r:18px;--shadow:0 8px 30px rgba(20,20,40,.12)}
  *{box-sizing:border-box}
  body{margin:0;font-family:Helvetica,Arial,sans-serif;color:var(--txt);min-height:100vh;padding:20px 14px;
    background:radial-gradient(800px 500px at 15% 5%,#ffe1ec 0,transparent 55%),radial-gradient(700px 600px at 90% 10%,#dce7ff 0,transparent 55%),radial-gradient(700px 600px at 70% 100%,#d9fbe7 0,transparent 55%),linear-gradient(135deg,#f5f6f9,#eef0f5);background-attachment:fixed}
  .glass{background:var(--glass);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%);border:1px solid var(--glass-brd);border-radius:var(--r);box-shadow:var(--shadow)}
  .shell{max-width:560px;margin:0 auto}
  .head{display:flex;align-items:center;gap:12px;justify-content:center}
  .ov{width:46px;height:46px;border-radius:13px;background:var(--ink);color:#fff;display:grid;place-items:center;font-weight:800;font-size:19px;letter-spacing:-1px}
  .head b{font-size:15px;letter-spacing:3px}
  h1{font-size:20px;text-align:center;margin:14px 0 2px}.sub{text-align:center;font-size:13px;color:var(--txt2);margin:0 0 18px}
  .card{padding:22px}
  label{font-size:12px;color:var(--txt2);display:flex;align-items:center;gap:6px;margin-bottom:5px}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.8);font-size:14px;font-family:inherit;color:var(--txt)}
  input:focus,select:focus,textarea:focus{outline:2px solid #6366f1;outline-offset:1px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.full{margin-bottom:14px}
  .help{display:inline-grid;place-items:center;width:17px;height:17px;border-radius:50%;background:rgba(37,99,235,.15);color:#1d4ed8;font-size:11px;font-weight:700;border:none;cursor:pointer}
  .result{background:var(--ink);color:#fff;border-radius:15px;padding:20px;margin:16px 0}
  .result small{font-size:11px;letter-spacing:1.5px;color:#b9b9c0}.price{font-size:28px;font-weight:800;margin:2px 0}.pernote{font-size:12px;color:#a7a7b0}
  .matgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
  .mat{padding:11px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.7);cursor:pointer;text-align:left}
  .mat.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--ink)}
  .mat b{font-size:13px;display:flex;align-items:center;gap:6px}.mat span{font-size:11px;color:var(--txt2)}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .chip{padding:7px 13px;border-radius:11px;border:1px solid var(--line);background:rgba(255,255,255,.7);font-size:13px;cursor:pointer}.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .dz{border:1px dashed var(--line);border-radius:12px;padding:14px;text-align:center;color:var(--txt2);font-size:13px;cursor:pointer}
  .btn{border:none;border-radius:13px;padding:13px;font-size:15px;font-weight:700;width:100%;background:var(--ink);color:#fff;cursor:pointer}.btn:hover{background:#26262b}.btn.alt{background:rgba(255,255,255,.75);color:var(--txt);border:1px solid var(--line)}
  .contact{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
  .callbtn{padding:13px;text-decoration:none;color:var(--txt);text-align:center;border:none;display:block}
  .callbtn .ic{font-size:20px}.callbtn b{display:block;font-size:14px;margin-top:2px}.callbtn span{font-size:11px;color:var(--txt2)}
  .ov-modal{position:fixed;inset:0;background:rgba(15,15,25,.4);backdrop-filter:blur(4px);display:grid;place-items:center;z-index:50;padding:18px}
  .modal{width:min(440px,94vw);padding:24px;max-height:90vh;overflow:auto}
  .bang{width:44px;height:44px;border-radius:50%;display:grid;place-items:center;font-size:22px;margin-bottom:8px;background:rgba(37,99,235,.14);color:#1d4ed8}
  .modal h3{margin:0 0 6px;font-size:17px}.modal p{font-size:13px;color:var(--txt2);line-height:1.6;margin:0 0 14px}.modal .btn{margin-top:6px}
  .note{font-size:11px;color:var(--txt2);text-align:center;margin-top:12px;line-height:1.5}
</style>
</head>
<body>

</svg><b>ORUVIAN</b></div>
  <h1>Hızlı fiyat al 🎯</h1>
  <p class="sub">Birkaç bilgi gir, yaklaşık fiyatı anında gör. Kesin fiyat onaydan sonra netleşir.</p>

  <div class="glass card">
    <label>Malzeme <button class="help" onclick="info('mat')">?</button></label>
    <div class="matgrid" id="matGrid"></div>

    <label>İstenen renk <button class="help" onclick="info('renk')">?</button></label>
    <div class="chips" id="colorChips">
      <div class="chip on" data-c="1" onclick="setColor(this,1)">Tek renk</div>
      <div class="chip" data-c="1.12" onclick="setColor(this,1.12)">Çok renkli 🎨</div>
    </div>

    <div class="row">
      <div><label>Tahmini ölçüler <button class="help" onclick="info('olcu')">?</button></label><input id="size" placeholder="Örn. 8×5×3 cm"></div>
      <div><label>Adet</label><input id="qty" type="number" value="1" min="1" oninput="calc()"></div>
    </div>

    <div class="row">
      <div><label>Ağırlık (g) <button class="help" onclick="info('gram')">?</button></label><input id="gram" type="number" value="120" oninput="calc()"></div>
      <div><label>Kullanım amacı</label><select id="use">
        <option>Dekoratif / hediyelik</option><option>Kafe / işletme</option><option>Fonksiyonel parça</option><option>Yedek parça</option><option>Promosyon / logolu</option><option>Diğer</option></select></div>
    </div>

    <div class="full">
      <label>Dosya / görsel (opsiyonel) <button class="help" onclick="info('dosya')">?</button></label>
      <label class="dz" for="file" style="margin:0"><span id="fileLbl">📎 STL, görsel veya örnek yükle</span></label>
      <input id="file" type="file" style="display:none" onchange="document.getElementById('fileLbl').textContent='📎 '+(this.files[0]?this.files[0].name:'dosya seç')">
    </div>

    <div class="result">
      <small>YAKLAŞIK FİYAT</small><div class="price" id="price">— ₺</div><div class="pernote" id="per"></div>
    </div>

    <button class="btn" onclick="openQuote()">📨 Teklif al</button>

    <p style="font-size:12px;color:var(--txt2);text-align:center;margin:16px 0 6px">veya bize doğrudan ulaş 👇</p>
    <div class="contact" id="contactList"></div>

    <p class="note">Bilgilerin <b>kaydedilmez</b>. "Teklif al" verileri hazır bir e-postaya doldurur — gönderme kararı sende.</p>
  </div>
</div>

<div id="modalRoot"></div>

<script>
/* ===== Merkezi yapılandırma ===== */
const CONFIG={quoteEmail:"info@oruvian.com",contacts:[{name:"Hakan",phone:"+90 553 573 73 67"},{name:"Cemal",phone:"+90 534 987 55 52"}]};
const MAT=[
  {key:"pla",name:"PLA",emoji:"🟢",kg:650,desc:"Ekonomik, dekoratif",info:"PLA: En yaygın malzeme. Ucuz, kokusuz, çevreci. İç mekan dekoratif ürünler, figürler için ideal. Çok sıcağa (araba içi) dayanımı düşüktür."},
  {key:"petg",name:"PETG",emoji:"🔵",kg:750,desc:"Dayanıklı, ısıya iyi",info:"PETG: PLA'dan daha dayanıklı ve esnek. Neme, ısıya, darbeye daha iyi direnir. Kafe/mutfak ürünleri, dış mekan ve sık kullanılan parçalar için önerilir."},
  {key:"abs",name:"ABS",emoji:"⚫",kg:700,desc:"Sağlam, mekanik",info:"ABS: Sağlam ve ısıya dayanıklı. Mekanik/teknik parçalar için. Dayanıklılık önemliyse tercih edilir."},
  {key:"tpu",name:"TPU",emoji:"🟣",kg:1100,desc:"Esnek, lastik gibi",info:"TPU: Esnek, lastik gibi malzeme. Kılıf, tampon, esneyebilen parçalar için."}
];
let selMat=MAT[0],colorMult=1;
const PER_PRINT=170,MARGIN=1.0;
function fmt(n){return Math.round(n).toLocaleString('tr-TR');}

function renderMat(){const g=document.getElementById('matGrid');g.innerHTML="";
  MAT.forEach(m=>{const d=document.createElement('div');d.className="mat"+(m.key===selMat.key?" on":"");
    d.innerHTML=`<b>${m.emoji} ${m.name} <button class="help" onclick="event.stopPropagation();infoMat('${m.key}')">?</button></b><span>${m.desc}</span>`;
    d.onclick=()=>{selMat=m;renderMat();calc();};g.appendChild(d);});}
function setColor(el,v){document.querySelectorAll('#colorChips .chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');colorMult=v;calc();}
function renderContacts(){const el=document.getElementById('contactList');el.innerHTML="";
  CONFIG.contacts.forEach(c=>{const a=document.createElement('a');a.className="glass callbtn";a.href="tel:"+c.phone.replace(/\s/g,'');
    a.innerHTML=`<div class="ic">📞</div><b>${c.name}</b><span>${c.phone}</span>`;el.appendChild(a);});}

function calc(){const gram=parseFloat(document.getElementById('gram').value)||0;const qty=Math.max(1,parseInt(document.getElementById('qty').value,10)||1);
  const filament=(gram/1000)*selMat.kg;let unit=(filament+PER_PRINT)*MARGIN*colorMult;
  const tier=qty>=100?0.8:qty>=50?0.88:qty>=20?0.94:1;unit*=tier;const low=unit,high=unit*1.15;
  document.getElementById('price').textContent=fmt(low*qty)+" – "+fmt(high*qty)+" ₺";
  document.getElementById('per').textContent=`${selMat.emoji} ${selMat.name} · adet başı ~${fmt(low)}–${fmt(high)} ₺ · ${qty} adet`;}

function openQuote(){
  modal('📨','Teklif al',
   `<p>İletişim bilgini gir; bilgilerin <b>hazır bir e-postaya</b> doldurulur. Hiçbir şey kaydedilmez.</p>
    <div style="text-align:left">
      <label>İsim <span style="color:#dc2626">*</span></label><input id="qName" placeholder="Adın">
      <label style="margin-top:10px">E-posta <span style="color:#dc2626">*</span></label><input id="qMail" type="email" placeholder="ornek@mail.com">
      <label style="margin-top:10px">Telefon (opsiyonel)</label><input id="qPhone" placeholder="+90 5xx ...">
      <div id="qErr" style="color:#dc2626;font-size:12px;min-height:14px;margin-top:6px"></div></div>`,
   [{l:"E-postayı hazırla",c:"btn",f:"submitQuote()"},{l:"Vazgeç",c:"btn alt",f:"closeModal()"}]);
}
function submitQuote(){
  const name=document.getElementById('qName').value.trim();const mail=document.getElementById('qMail').value.trim();const phone=document.getElementById('qPhone').value.trim();
  const err=document.getElementById('qErr');
  if(!name){err.textContent="Lütfen isim gir.";return;}
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(mail)){err.textContent="Geçerli bir e-posta gir.";return;}
  const file=document.getElementById('file').files[0];
  const body=encodeURIComponent(
   `Merhaba Oruvian,\n\nBir teklif talebim var:\n`+
   `• İsim: ${name}\n• E-posta: ${mail}\n• Telefon: ${phone||"-"}\n`+
   `• Malzeme: ${selMat.name}\n• Renk: ${colorMult>1?"Çok renkli":"Tek renk"}\n`+
   `• Ölçüler: ${document.getElementById('size').value||"-"}\n• Ağırlık: ${document.getElementById('gram').value} g\n`+
   `• Adet: ${document.getElementById('qty').value}\n• Kullanım amacı: ${document.getElementById('use').value}\n`+
   (file?`• Dosya: ${file.name} (maile ekleyeceğim)\n`:"")+
   `• Gördüğüm yaklaşık fiyat: ${document.getElementById('price').textContent}\n\nKesin fiyat için dönüşünüzü bekliyorum. Teşekkürler.`);
  const sub=encodeURIComponent("Teklif talebi — "+name);
  window.location.href=`mailto:${CONFIG.quoteEmail}?subject=${sub}&body=${body}`;
  if(file){modal('📎','Dosyayı eklemeyi unutma',`<p>Açılan e-postaya <b>${file.name}</b> dosyasını manuel eklemen gerekiyor — tarayıcılar dosyayı otomatik ekleyemez. (Yayında dosya yükleme sunucuya bağlanacak.)</p>`,[{l:"Tamam",c:"btn",f:"closeModal()"}]);}
  else closeModal();
}

const INFO={
  mat:["Malzeme nedir?","Ürünün hangi plastikten basılacağı. PLA ucuz ve dekoratif; PETG dayanıklı; emin değilsen PLA seç, yardımcı oluruz."],
  renk:["Renk seçimi","Tek renk standarttır. Çok renkli baskı (logo, iki renk) ek işçilik ister, fiyatı biraz artırır."],
  olcu:["Tahmini ölçüler","Ürünün yaklaşık en×boy×yükseklik ölçüsü. Bilmiyorsan boş bırak, açıklamaya yaz; biz hesaplarız."],
  gram:["Ağırlık (gram)","Ürünün tahmini ağırlığı. Küçük anahtarlık ~10-20 g, orta obje ~100-200 g. Bilmiyorsan ölçü yeterli."],
  dosya:["Dosya yükleme","Varsa 3D model (STL) veya örnek görsel ekleyebilirsin. Bu önizlemede dosya sunucuya gitmez; yayında otomatik iletilecek."]
};
function info(k){modal('ℹ️',INFO[k][0],`<p>${INFO[k][1]}</p>`,[{l:"Anladım",c:"btn",f:"closeModal()"}]);}
function infoMat(key){const m=MAT.find(x=>x.key===key);modal(m.emoji,m.name,`<p>${m.info}</p>`,[{l:"Anladım",c:"btn",f:"closeModal()"}]);}
function modal(icon,title,body,actions){const a=actions.map(x=>`<button class="${x.c}" onclick="${x.f}">${x.l}</button>`).join("");
  document.getElementById('modalRoot').innerHTML=`<div class="ov-modal" onclick="if(event.target===this)closeModal()"><div class="glass modal"><div class="bang">${icon}</div><h3>${title}</h3>${body}${a}</div></div>`;}
function closeModal(){document.getElementById('modalRoot').innerHTML="";}

renderMat();renderContacts();calc();
</script>
</body>
</html>
